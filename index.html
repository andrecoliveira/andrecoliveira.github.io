<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>André Oliveira — Resume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: #0d1a0f;
    color: #eee;
    font-family: 'Inter', -apple-system, sans-serif;
  }
  #mount-a { width: 100%; min-height: 100vh; }
</style>
</head>
<body>

<div id="mount-a" data-screen-label="Resume"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="resume-data.jsx"></script>
<script type="text/babel" src="resume-a.jsx"></script>

<script type="text/babel">
  const CONFIG = {
    lang: "pt",
    theme: "dark",
    accent: "#7dce94",
    heroVariant: "story",
    timelineVariant: "classic",
    density: "compact",
    fontA: "fraunces",
  };

  const FONT_MAP_A = {
    instrument: "'Instrument Serif', 'Times New Roman', serif",
    fraunces:  "'Fraunces', 'Times New Roman', serif",
  };

  function applyFontOverrides() {
    const styleEl = document.getElementById('font-overrides') || (() => {
      const s = document.createElement('style');
      s.id = 'font-overrides';
      document.head.appendChild(s);
      return s;
    })();
    styleEl.textContent = `
      #mount-a .rs-a [style*="Instrument Serif"] {
        font-family: ${FONT_MAP_A[CONFIG.fontA]} !important;
      }
    `;
  }

  // The built-in PT/EN toggle inside resume-a.jsx calls window.__setLang.
  // Keep that working by re-rendering on change.
  let currentLang = CONFIG.lang;

  function render() {
    const props = {
      lang: currentLang,
      theme: CONFIG.theme,
      density: CONFIG.density,
      heroVariant: CONFIG.heroVariant,
      timelineVariant: CONFIG.timelineVariant,
      accent: CONFIG.accent,
    };
    const mountA = document.getElementById('mount-a');
    if (!mountA._root) mountA._root = ReactDOM.createRoot(mountA);
    mountA._root.render(<ResumeEditorialSerif {...props} />);
    applyFontOverrides();
  }

  window.__setLang = (val) => {
    currentLang = val;
    try { localStorage.setItem('ao-resume-lang', val); } catch {}
    render();
  };

  // Restore saved language preference (user's last PT/EN choice)
  try {
    const saved = localStorage.getItem('ao-resume-lang');
    if (saved === 'pt' || saved === 'en') currentLang = saved;
  } catch {}

  render();
</script>

</body>
</html>
